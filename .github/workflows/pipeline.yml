name: Pipeline

on:
  push:
    branches: [main, develop, feature/monorepo]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      forcePublish:
        description: "Force publish apps"
        required: false
        type: boolean
        default: false
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ github.job }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ github.job }}-${{ github.ref_name }}-
            turbo-${{ github.job }}-

      - name: Lint
        run: pnpm turbo lint
        continue-on-error: true

      - name: Typecheck
        run: pnpm turbo typecheck
        continue-on-error: true

      - name: Build
        run: pnpm turbo build
        continue-on-error: true

      - name: Test (Unit)
        run: pnpm turbo test
        continue-on-error: true

  release:
    name: Check Release & PR
    needs: verify
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'feature/monorepo'))
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Create Release Pull Request or Check Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: echo "published=true"
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-apps:
    name: Build Apps (${{ matrix.os }} - ${{ matrix.arch }})
    needs: release
    # Only run if a release was published or it's a force publish
    if: |
      needs.release.result == 'success' && 
      (needs.release.outputs.published == 'true' || github.event.inputs.forcePublish == 'true' || github.ref_name == 'feature/monorepo')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        arch: [x64, arm64]
        exclude:
          - os: ubuntu-latest
            arch: arm64
          - os: windows-latest
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Import Apple Code Signing Certificate
        uses: apple-actions/import-codesign-certs@v3
        if: matrix.os == 'macos-latest'
        with:
          p12-file-base64: ${{ secrets.CERTIFICATE_OSX_APPLICATION }}
          p12-password: ${{ secrets.CERTIFICATE_OSX_APPLICATION_PASSWORD }}

      - name: Build & Package
        env:
          DEBUG: "electron-osx-sign*,electron-forge:*"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TARGET_ARCH: ${{ matrix.arch }}
        run: pnpm turbo make --filter=@pipelab/app -- --arch ${{ matrix.arch }}

      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-artifacts-${{ matrix.os }}-${{ matrix.arch }}
          path: apps/desktop/out/make/**/*

      - name: Upload CLI Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-artifacts-${{ matrix.os }}-${{ matrix.arch }}
          path: apps/cli/bin/*

  deploy:
    name: Deploy Release
    needs: [release, publish-apps]
    if: |
      needs.release.outputs.published == 'true' ||
      github.event.inputs.forcePublish == 'true' ||
      github.ref_name == 'feature/monorepo'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Create Package GitHub Releases
        id: changesets_tag
        uses: changesets/action@v1
        with:
          publish: pnpm changeset tag
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get Versions
        id: versions
        shell: bash
        run: |
          APP_VERSION=$(node -p "require('./apps/desktop/package.json').version")
          CLI_VERSION=$(node -p "require('./apps/cli/package.json').version")
          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT
          echo "cli_version=$CLI_VERSION" >> $GITHUB_OUTPUT

          IS_PRERELEASE="false"
          if [[ $APP_VERSION == *"-"* ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.prerelease }}" == "true" ]] || [[ "${{ github.ref_name }}" == "feature/monorepo" ]]; then
            IS_PRERELEASE="true"
          fi

          echo "prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT

      - name: Upload Desktop Binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "@pipelab/app@${{ steps.versions.outputs.app_version }}"
          prerelease: ${{ steps.versions.outputs.prerelease == 'true' }}
          files: |
            artifacts/desktop-artifacts-*/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload CLI Binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "@pipelab/cli@${{ steps.versions.outputs.cli_version }}"
          prerelease: ${{ steps.versions.outputs.prerelease == 'true' }}
          files: |
            artifacts/cli-artifacts-*/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
