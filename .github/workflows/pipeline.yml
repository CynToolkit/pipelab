name: Pipeline

on:
  push:
    branches: [main, develop, feature/monorepo]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      forcePublish:
        description: "Force publish apps"
        required: false
        type: boolean
        default: false
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      affected: ${{ steps.detect.outputs.affected }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Detect Changes
        id: detect
        run: |
          # Get the last tag to compare against
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "HEAD~10")
          echo "Comparing against: $LAST_TAG"

          # Use turbo to list affected packages
          # We use npx to avoid full install if possible, but turbo needs the graph
          npx turbo ls -F "[$LAST_TAG]" --output=json > affected.json
          
          # Run our detection script
          npx tsx scripts/detect-changes.ts affected.json

  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ github.job }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ github.job }}-${{ github.ref_name }}-
            turbo-${{ github.job }}-

      - name: Lint
        run: pnpm turbo lint
        continue-on-error: true

      - name: Typecheck
        run: pnpm turbo typecheck
        continue-on-error: true

      # Skip build here - we'll build in publish-apps job with artifacts cached

      - name: Test (Unit)
        run: pnpm turbo test
        continue-on-error: true

  release:
    name: Check Release & PR
    needs: verify
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'feature/monorepo'))
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Create Release Pull Request or Check Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-ui:
    name: Build UI
    needs: [release, changes]
    if: |
      needs.release.result == 'success' && 
      (needs.release.outputs.published == 'true' || github.event.inputs.forcePublish == 'true' || github.ref_name == 'feature/monorepo') &&
      (contains(fromJson(needs.changes.outputs.affected), '@pipelab/ui') || github.event.inputs.forcePublish == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
      - run: pnpm install

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-build-ui-${{ github.sha }}
          restore-keys: |
            turbo-build-ui-

      - name: Build UI
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
        run: pnpm --filter @pipelab/ui build
      - uses: actions/upload-artifact@v4
        with:
          name: ui-artifacts
          path: apps/ui/dist/**/*

  build-desktop:
    name: Build Desktop (${{ matrix.os }} - ${{ matrix.arch }})
    needs: [release, changes]
    if: |
      needs.release.result == 'success' && 
      (needs.release.outputs.published == 'true' || github.event.inputs.forcePublish == 'true' || github.ref_name == 'feature/monorepo') &&
      (contains(fromJson(needs.changes.outputs.affected), '@pipelab/app') || github.event.inputs.forcePublish == 'true')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        arch: [x64, arm64]
        exclude:
          - os: ubuntu-latest
            arch: arm64
          - os: windows-latest
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
      - run: pnpm install

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-build-desktop-${{ matrix.os }}-${{ matrix.arch }}-${{ github.sha }}
          restore-keys: |
            turbo-build-desktop-${{ matrix.os }}-${{ matrix.arch }}-
            turbo-build-desktop-${{ matrix.os }}-
            turbo-build-desktop-

      - name: Import Apple Code Signing Certificate
        uses: apple-actions/import-codesign-certs@v3
        if: matrix.os == 'macos-latest'
        with:
          p12-file-base64: ${{ secrets.CERTIFICATE_OSX_APPLICATION }}
          p12-password: ${{ secrets.CERTIFICATE_OSX_APPLICATION_PASSWORD }}

      - name: Package & Make Desktop
        env:
          DEBUG: "electron-osx-sign*,electron-forge:*"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TARGET_ARCH: ${{ matrix.arch }}
        run: |
          pnpm --filter @pipelab/app package -- --arch ${{ matrix.arch }}
          pnpm --filter @pipelab/app make -- --arch ${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-artifacts-${{ matrix.os }}-${{ matrix.arch }}
          path: apps/desktop/out/make/**/*

  build-cli:
    name: Build CLI
    needs: [release, changes]
    if: |
      needs.release.result == 'success' && 
      (needs.release.outputs.published == 'true' || github.event.inputs.forcePublish == 'true' || github.ref_name == 'feature/monorepo') &&
      (contains(fromJson(needs.changes.outputs.affected), '@pipelab/cli') || github.event.inputs.forcePublish == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
      - run: pnpm install

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-build-cli-ubuntu-latest-x64-${{ github.sha }}
          restore-keys: |
            turbo-build-cli-ubuntu-latest-x64-
            turbo-build-cli-ubuntu-latest-
            turbo-build-cli-

      - name: Build CLI
        run: pnpm --filter @pipelab/cli build

  test-cli-e2e:
    name: Test CLI E2E
    needs: [build-cli, changes]
    if: |
      always() &&
      needs.build-cli.result == 'success' &&
      contains(fromJson(needs.changes.outputs.affected), '@pipelab/cli')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
      - run: pnpm install

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-test-cli-e2e-${{ matrix.os }}-${{ matrix.arch }}-${{ github.sha }}
          restore-keys: |
            turbo-test-cli-e2e-${{ matrix.os }}-${{ matrix.arch }}-
            turbo-test-cli-e2e-${{ matrix.os }}-
            turbo-test-cli-e2e-

      - name: Run CLI E2E Tests
        run: pnpm turbo test:e2e:raw --filter @pipelab/cli

  deploy:
    name: Deploy Release
    needs: [release, build-desktop, build-cli, build-ui, test-cli-e2e, changes]
    if: |
      always() &&
      needs.release.result == 'success' &&
      (needs.test-cli-e2e.result == 'success' || needs.test-cli-e2e.result == 'skipped') &&
      (needs.release.outputs.published == 'true' ||
      github.event.inputs.forcePublish == 'true' ||
      github.ref_name == 'feature/monorepo')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Create Package GitHub Releases
        id: changesets_tag
        uses: changesets/action@v1
        with:
          publish: pnpm changeset tag
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
        continue-on-error: true

      - name: Get Versions
        id: versions
        shell: bash
        run: |
          APP_VERSION=$(node -p "require('./apps/desktop/package.json').version")
          CLI_VERSION=$(node -p "require('./apps/cli/package.json').version")
          ASSET_ELECTRON_VERSION=$(node -p "require('./packages/asset-electron/package.json').version")
          ASSET_DISCORD_VERSION=$(node -p "require('./packages/asset-discord/package.json').version")
          ASSET_NETLIFY_VERSION=$(node -p "require('./packages/asset-netlify/package.json').version")
          ASSET_TAURI_VERSION=$(node -p "require('./packages/asset-tauri/package.json').version")
          UI_VERSION=$(node -p "require('./apps/ui/package.json').version")
          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT
          echo "cli_version=$CLI_VERSION" >> $GITHUB_OUTPUT
          echo "asset_electron_version=$ASSET_ELECTRON_VERSION" >> $GITHUB_OUTPUT
          echo "asset_discord_version=$ASSET_DISCORD_VERSION" >> $GITHUB_OUTPUT
          echo "asset_netlify_version=$ASSET_NETLIFY_VERSION" >> $GITHUB_OUTPUT
          echo "asset_tauri_version=$ASSET_TAURI_VERSION" >> $GITHUB_OUTPUT
          echo "ui_version=$UI_VERSION" >> $GITHUB_OUTPUT

          IS_PRERELEASE="false"
          if [[ $APP_VERSION == *"-"* ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.prerelease }}" == "true" ]] || [[ "${{ github.ref_name }}" == "feature/monorepo" ]]; then
            IS_PRERELEASE="true"
          fi

          echo "prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT

      - name: Upload Desktop Binaries
        if: contains(fromJson(needs.changes.outputs.affected), '@pipelab/app') || github.event.inputs.forcePublish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "@pipelab/app@${{ steps.versions.outputs.app_version }}"
          prerelease: ${{ steps.versions.outputs.prerelease == 'true' }}
          files: |
            artifacts/desktop-artifacts-*/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Assets
        shell: bash
        run: |
          # Only package assets that have changes
          if [[ "${{ contains(fromJson(needs.changes.outputs.affected), '@pipelab/asset-electron') }}" == "true" ]] || [[ "${{ github.event.inputs.forcePublish }}" == "true" ]]; then
            (cd packages/asset-electron && zip -r asset.zip .)
          fi
          if [[ "${{ contains(fromJson(needs.changes.outputs.affected), '@pipelab/asset-discord') }}" == "true" ]] || [[ "${{ github.event.inputs.forcePublish }}" == "true" ]]; then
            (cd packages/asset-discord && zip -r asset.zip .)
          fi
          if [[ "${{ contains(fromJson(needs.changes.outputs.affected), '@pipelab/asset-netlify') }}" == "true" ]] || [[ "${{ github.event.inputs.forcePublish }}" == "true" ]]; then
            (cd packages/asset-netlify && zip -r asset.zip .)
          fi
          if [[ "${{ contains(fromJson(needs.changes.outputs.affected), '@pipelab/asset-tauri') }}" == "true" ]] || [[ "${{ github.event.inputs.forcePublish }}" == "true" ]]; then
            (cd packages/asset-tauri && zip -r asset.zip .)
          fi

          # Package UI from downloaded artifacts
          if [ -d "artifacts/ui-artifacts" ]; then
            (cd artifacts/ui-artifacts && zip -r ../../apps/ui/asset.zip .)
          fi

      - name: Upload Asset Electron
        if: contains(fromJson(needs.changes.outputs.affected), '@pipelab/asset-electron') || github.event.inputs.forcePublish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "@pipelab/asset-electron@${{ steps.versions.outputs.asset_electron_version }}"
          files: packages/asset-electron/asset.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Upload Asset Discord
        if: contains(fromJson(needs.changes.outputs.affected), '@pipelab/asset-discord') || github.event.inputs.forcePublish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "@pipelab/asset-discord@${{ steps.versions.outputs.asset_discord_version }}"
          files: packages/asset-discord/asset.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Upload Asset Netlify
        if: contains(fromJson(needs.changes.outputs.affected), '@pipelab/asset-netlify') || github.event.inputs.forcePublish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "@pipelab/asset-netlify@${{ steps.versions.outputs.asset_netlify_version }}"
          files: packages/asset-netlify/asset.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Upload Asset Tauri
        if: contains(fromJson(needs.changes.outputs.affected), '@pipelab/asset-tauri') || github.event.inputs.forcePublish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "@pipelab/asset-tauri@${{ steps.versions.outputs.asset_tauri_version }}"
          files: packages/asset-tauri/asset.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Upload Asset UI
        if: contains(fromJson(needs.changes.outputs.affected), '@pipelab/ui') || github.event.inputs.forcePublish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "@pipelab/ui@${{ steps.versions.outputs.ui_version }}"
          files: apps/ui/asset.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
