release-check:
  name: Check Release & Create PR
  needs: verify
  runs-on: ubuntu-latest
  outputs:
    published: ${{ steps.changesets.outputs.published }}
  steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: pnpm/action-setup@v4
      with:
        run_install: false
    - name: Use Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: "pnpm"
    - name: Install dependencies
      run: pnpm install
    - name: Create Release PR or identify publish
      id: changesets
      uses: changesets/action@v1
      with:
        publish: echo "published=true"
        createGithubReleases: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
